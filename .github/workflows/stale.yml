name: 'Close stale issues and PRs'
on:
  schedule:
    - cron: '30 1 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs.

            If this issue is still relevant, please:
            - Add a comment explaining why this issue is still important
            - Include any additional information or context
            - Reference any related work or progress

            Thank you for your contribution to matrix-lib! 🚀

          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs.

            If you're still working on this PR, please:
            - Add a comment to keep it open
            - Push new commits if you have additional changes
            - Rebase on the latest master branch

            We appreciate your contribution to matrix-lib! 🔧

          close-issue-message: |
            This issue has been automatically closed due to inactivity. If this issue is still relevant, please feel free to reopen it with additional context or information.

          close-pr-message: |
            This pull request has been automatically closed due to inactivity. If you'd like to continue working on this, please reopen the PR and let us know!

          days-before-stale: 60
          days-before-close: 14
          exempt-issue-labels: 'pinned,security,help wanted,good first issue'
          exempt-pr-labels: 'work in progress,WIP'
          operations-per-run: 30